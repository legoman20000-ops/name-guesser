<!DOCTYPE html>
<html>
<head>
<title>Name Guesser</title>
<style>
body {
  font-family: Arial;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.card {
  text-align: center;
}
input, button {
  margin-top: 10px;
  padding: 10px;
}
</style>
</head>
<body>

<div class="card">
  <h1 id="title">Loading...</h1>

  <div id="askBox" style="display:none;">
    <input id="nameInput" placeholder="Enter your name">
    <br>
    <button onclick="saveName()">Continue</button>
  </div>

  <button onclick="reset()" style="margin-top:20px;">Reset</button>
</div>

<script>
const key = "realName";

function load() {
  let name = localStorage.getItem(key);

  if (!name) {
    document.getElementById("title").innerText = "What is your name?";
    document.getElementById("askBox").style.display = "block";
  } else {
    document.getElementById("title").innerText = "Welcome, " + name;
  }
}

function saveName() {
  let name = document.getElementById("nameInput").value.trim();
  if (!name) return;

  name = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
  localStorage.setItem(key, name);

  load();
}

function reset() {
  localStorage.removeItem(key);
  location.reload();
}

load();
</script>

</body>
</html>
